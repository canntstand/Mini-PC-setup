services:
  synapse:
    container_name: synapse
    image: matrixdotorg/synapse:v1.152.1
    restart: always
    expose:
      - 8008
    volumes:
      - ./matrix/data:/data
    depends_on:
      synapse_db:
        condition: service_healthy
    environment:
      - SYNAPSE_REPORT_STATS=no

  synapse_db:
    container_name: synapse_db
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB_SYNAPSE}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=C --lc-ctype=C
    volumes:
      - ./matrix/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB_SYNAPSE}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:stable
    container_name: nginx_proxy
    expose:
      - 80
    restart: always
    environment:
      - SYNAPSE_SERVER_NAME=${SYNAPSE_SERVER_NAME}
    volumes:
      - ./nginx/templates/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/www:/usr/share/nginx/html:ro
    depends_on:
      - synapse
      - navidrome
      - audiobookshelf
      - nextcloud

  tuna_matrix:
    container_name: tuna_matrix
    image: yuccastream/tuna:latest
    restart: always
    environment:
      - TUNA_TOKEN=${TUNA_TOKEN}
      - SYNAPSE_SERVER_NAME=${SYNAPSE_SERVER_NAME}
    command: http nginx:80 --domain=${SYNAPSE_SERVER_NAME} --https-redirect
    depends_on:
      - nginx

  tuna_ssh:
    container_name: tuna_ssh
    image: yuccastream/tuna:latest
    restart: always
    network_mode: "host"
    environment:
      - TUNA_TOKEN=${TUNA_TOKEN}
    command: tcp 22 --port=${TUNA_SSH_PORT}

  navidrome:
    container_name: navidrome
    image: deluan/navidrome:latest
    restart: always
    expose:
      - 4533
    environment:
      ND_SCANINTERVAL: "1m"
      ND_LOGLEVEL: "info"
      ND_BASEURL: "/navidrome"
    volumes:
      - ./navidrome/data:/data
      - /home/r9888/Music:/music:ro

  audiobookshelf:
    container_name: audiobookshelf
    image: advplyr/audiobookshelf:latest
    restart: always
    expose:
      - 80
    environment:
      - AUDIOBOOKSHELF_PORT=80
      - AUDIOBOOKSHELF_BASE_PATH=/audiobookshelf
    volumes:
      - ./audiobookshelf/config:/config
      - ./audiobookshelf/metadata:/metadata
      - /home/r9888/Audiobooks:/audiobooks
      - /home/r9888/Podcasts:/podcasts
      - /home/r9888/Books:/books

  nextcloud_db:
    image: postgres:15-alpine
    container_name: nextcloud_db
    restart: always
    volumes:
      - ./nextcloud/db:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB_NEXTCLOUD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    expose:
      - 5432
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB_NEXTCLOUD}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  nextcloud:
    image: nextcloud:stable
    container_name: nextcloud
    restart: always
    expose:
      - 80
    depends_on:
      nextcloud_db:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=nextcloud_db
      - POSTGRES_DB=${POSTGRES_DB_NEXTCLOUD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=${ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - OVERWRITEWEBROOT=/nextcloud
      - OVERWRITEPROTOCOL=https
      - HTACCESS_OVERRIDE_CURRENT=1
    volumes:
      - ./nextcloud/html:/var/www/html
      - /home/r9888/NextcloudData:/var/www/html/data

  nextcloud_configure:
    image: nextcloud:stable
    container_name: nextcloud_configure
    restart: "no"
    depends_on:
      - nextcloud
    volumes:
      - ./nextcloud/html:/var/www/html
      - /home/r9888/NextcloudData:/var/www/html/data
    entrypoint: /bin/sh
    command: >
      -c "
      echo 'Waiting for Nextcloud to be installed...';
      until [ -f /var/www/html/config/config.php ]; do sleep 2; done;
      sleep 10;
        
      echo 'Applying system fixes...';

      php occ config:system:set trusted_domains 1 --value='${SYNAPSE_SERVER_NAME}';

      php occ config:system:set trusted_proxies 0 --value='172.16.0.0/12';

      php occ config:system:set maintenance_window_start --value=2 --type=int;
      php occ background-job:set cron;

      php occ config:system:set default_phone_region --value='RU';
      php occ config:system:set filelocking.enabled --value=true --type=boolean;
      php occ config:system:set memcache.local --value='\\\\OC\\\\Memcache\\\\APCu';
      php occ config:system:set server_id --value='\$(cat /proc/sys/kernel/random/uuid)';
        
      echo 'Applying migrations and htaccess...';
      php occ maintenance:repair --include-expensive --no-interaction;
      php occ maintenance:update:htaccess;
        
      echo 'Configuration applied successfully!';
      "
