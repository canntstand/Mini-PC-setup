x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  uptime-kuma:
    image: louislam/uptime-kuma:2.3.2
    container_name: uptime-kuma
    logging: *default-logging
    restart: always
    volumes:
      - ./uptime-kuma-data:/app/data
    networks:
      - vps_network
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:stable
    container_name: nginx_vps
    logging: *default-logging
    restart: always
    ports:
      - "3001:3001"
      - "3002:3002"
    networks:
      - vps_network
    volumes:
      - ./nginx/nginx.remote.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          memory: 512M

  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15.3
    container_name: wg-easy
    environment:
      - LANG=en
      - WG_HOST=${SERVER_IP}
      - PORT=51821
      - WG_PORT=51820
      - WG_DEFAULT_ADDRESS=10.8.0.x
      - PROMETHEUS_ENABLED=true
      - INIT_ENABLED=true
      - INIT_USERNAME=${ADMIN_USER}
      - INIT_PASSWORD=${ADMIN_PASSWORD}
      - WG_DEFAULT_DNS=1.1.1.1
      - WG_PERSISTENT_KEEPALIVE=25
      - WG_ALLOWED_IPS=0.0.0.0/0
      - EXPERIMENTAL_AWG=true
      - OVERRIDE_AUTO_AWG=awg
      - INSECURE=true
    volumes:
      - ./config:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    network_mode: "host"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE

networks:
  vps_network:
    ipam:
      config:
        - subnet: 10.90.0.0/16