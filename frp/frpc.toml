serverAddr = "{{ .Envs.FRP_SERVER_IP }}"
serverPort = 7000
auth.method = "token"
auth.token = "{{ .Envs.FRP_TOKEN }}"

[[proxies]]
name = "https_traffic"
type = "tcp"
localIP = "nginx_proxy"
localPort = 443
remotePort = 8443

[[proxies]]
name = "secure_ssh"
type = "tcp"
localIP = "host.docker.internal"
localPort = 22
remotePort = 2222